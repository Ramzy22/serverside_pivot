name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<71"
          python -m pip install duckdb pyarrow "ibis-framework[duckdb]" pandas fastapi "uvicorn[standard]" dash pytest tomli redis "python-jose[cryptography]"

      - name: Add pivot-engine to PYTHONPATH
        run: echo "PYTHONPATH=$PYTHONPATH:${{ github.workspace }}/dash_tanstack_pivot/pivot_engine" >> $GITHUB_ENV

      - name: Install serverside-pivot (editable)
        run: pip install -e dash_tanstack_pivot/

      - name: Run packaging smoke tests
        run: |
          python -m pytest tests/test_packaging_smoke.py -v

      - name: Run docs examples contract tests
        run: |
          python -m pytest tests/test_docs_examples_contract.py -v

      - name: Run multi-instance isolation tests
        run: |
          python -m pytest tests/test_multi_instance_isolation.py -v

      - name: Run Dash runtime callback tests
        run: |
          python -m pytest tests/test_dash_runtime_callbacks.py -v

      - name: Run session request gate tests
        run: |
          python -m pytest tests/test_session_request_gate.py -v

      - name: Run runtime service tests
        run: |
          python -m pytest tests/test_runtime_service.py -v

  js-build:
    name: JS Build and Bundle Contract
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dash_tanstack_pivot

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm install

      - name: Install Python for build:py step
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install setuptools for build:py
        run: pip install "setuptools<71" dash

      - name: Build JS bundle
        run: npm run build:js

      - name: Regenerate Python component metadata (non-fatal)
        run: npm run build:py || echo "build:py parse warnings (ChainExpression) — pre-generated files used"

      - name: Verify bundle contract
        working-directory: ${{ github.workspace }}
        run: python scripts/ci/verify_bundle_contract.py

  package-smoke:
    name: Package Build and Import Smoke
    runs-on: ubuntu-latest
    needs: [python-tests, js-build]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip "setuptools<71" build twine

      - name: Build distribution
        run: python -m build dash_tanstack_pivot/

      - name: Check distribution metadata
        run: twine check dash_tanstack_pivot/dist/*

      - name: Install from wheel and run import smoke
        run: |
          pip install dash_tanstack_pivot/dist/*.whl
          python -c "import dash_tanstack_pivot; print('Import smoke: OK')"
