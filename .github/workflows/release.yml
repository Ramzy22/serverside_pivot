name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  validate-and-publish:
    name: Validate and Publish to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip "setuptools<71" duckdb pyarrow "ibis-framework[duckdb]" pandas dash pytest tomli redis "python-jose[cryptography]" build twine

      - name: Install pivot-engine (backend)
        run: pip install git+https://github.com/Ramzy22/pivot_engine.git

      - name: Install serverside-pivot (editable)
        run: pip install -e dash_tanstack_pivot/

      - name: Validate tag/version parity
        run: python scripts/ci/check_tag_version.py

      - name: Run multi-instance isolation gate
        run: python -m pytest tests/test_multi_instance_isolation.py tests/test_dash_runtime_callbacks.py tests/test_session_request_gate.py tests/test_runtime_service.py -v

      - name: Run packaging smoke tests
        run: python -m pytest tests/test_packaging_smoke.py tests/test_docs_examples_contract.py -v

      - name: Build distribution
        run: python -m build dash_tanstack_pivot/

      - name: Validate artifacts with twine check
        run: twine check dash_tanstack_pivot/dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dash_tanstack_pivot/dist/
