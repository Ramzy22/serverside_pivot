<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #F4F7FB; padding: 16px; display: flex; gap: 12px; }
svg { display: inline-block; vertical-align: middle; flex-shrink: 0; }
.sidebar { width: 220px; background: #fff; border: 1px solid #E5E7EB; border-radius: 16px; padding: 14px; display: flex; flex-direction: column; gap: 14px; box-shadow: 0 2px 8px rgba(15,23,42,0.04); }
.sec-title { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #94A3B8; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.chip { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px; padding: 6px 10px; display: flex; align-items: center; gap: 8px; box-shadow: 0 1px 2px rgba(15,23,42,0.05); font-size: 12px; color: #111827; margin-bottom: 5px; cursor: grab; }
.drop-zone { min-height: 40px; border: 1px solid #F3F4F6; border-radius: 10px; padding: 6px; background: rgba(249,250,251,0.5); box-shadow: inset 0 1px 0 rgba(255,255,255,0.8); }
.field-item { display: flex; align-items: center; gap: 8px; padding: 5px 8px; font-size: 12px; color: #475569; border-radius: 6px; cursor: default; }
.field-item:hover { background: #F8FAFC; }
.val-chip { background: rgba(79,70,229,0.06); border: 1px solid rgba(79,70,229,0.15); border-radius: 10px; padding: 5px 10px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: #3730A3; margin-bottom: 5px; }
</style></head><body>
