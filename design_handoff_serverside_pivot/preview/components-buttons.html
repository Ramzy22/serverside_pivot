<!DOCTYPE html>
<html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', sans-serif; background: #fff; padding: 16px; }
.title { font-size: 10px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: #94A3B8; margin-bottom: 8px; }
.row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
svg { display: inline-block; vertical-align: middle; }
</style></head><body>

<div class="title">Buttons — Flash Theme</div>
<div class="row">
  <button style="padding:4px 10px;border-radius:10px;border:1px solid transparent;background:#4F46E5;color:#fff;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:5px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    Export
  </button>
  <button style="padding:4px 10px;border-radius:10px;border:1px solid #E5E7EB;background:#fff;color:#111827;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:5px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13H5v-2h14v2z"/></svg>
    Cancel
  </button>
  <button style="padding:4px 10px;border-radius:10px;border:1px solid #E5E7EB;background:transparent;color:#111827;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;display:inline-flex;align-items:center;gap:5px">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.23 7.23 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.5-.42H10.1a.5.5 0 0 0-.5.42l-.36 2.54c-.58.23-1.13.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.7 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.82 14.52a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.4 1.05.72 1.63.94l.36 2.54a.5.5 0 0 0 .5.42h3.8a.5.5 0 0 0 .5-.42l.36-2.54c.58-.23 1.13-.54 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64l-2.03-1.58z"/></svg>
    Settings
  </button>
  <button style="padding:6px 6px;border-radius:10px;border:1px solid #E5E7EB;background:transparent;color:#475569;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
  </button>
  <button style="padding:6px 6px;border-radius:10px;border:1px solid #E5E7EB;background:transparent;color:#475569;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M5 5h5v2H7v3H5V5zm9 0h5v5h-2V7h-3V5zM5 14h2v3h3v2H5v-5zm12 3v-3h2v5h-5v-2h3z"/></svg>
  </button>
</div>

<div class="title">Buttons — Dark Theme</div>
<div class="row" style="background:#0F1218;padding:10px;border-radius:10px">
  <button style="padding:4px 10px;border-radius:10px;border:1px solid transparent;background:#818CF8;color:#0A0C10;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif">Export</button>
  <button style="padding:4px 10px;border-radius:10px;border:1px solid rgba(255,255,255,0.10);background:transparent;color:#F8FAFC;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif">Cancel</button>
  <button style="padding:4px 10px;border-radius:10px;border:1px solid rgba(255,255,255,0.10);background:rgba(255,255,255,0.07);color:#F8FAFC;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif">Settings</button>
  <button style="padding:7px 10px;border-radius:10px;border:1px solid rgba(255,255,255,0.10);background:#818CF8;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">OK</button>
</div>

<div class="title" style="margin-top:12px">Buttons — Bloomberg Black</div>
<div class="row" style="background:#000;padding:10px;border-radius:10px">
  <button style="padding:4px 10px;border-radius:8px;border:1px solid transparent;background:#F59E0B;color:#000;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif">Export</button>
  <button style="padding:4px 10px;border-radius:8px;border:1px solid rgba(255,255,255,0.18);background:transparent;color:#fff;font-size:12px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif">Cancel</button>
  <button style="padding:7px 10px;border-radius:8px;border:1px solid #F59E0B;background:#F59E0B;color:#000;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">Done</button>
</div>

<div class="title" style="margin-top:12px">Meta Badge / Pill</div>
<div class="row">
  <span style="display:inline-flex;align-items:center;font-size:11px;font-weight:500;color:#64748B;background:#F8FAFC;border:1px solid #E5E7EB;border-radius:999px;padding:4px 10px">Frozen Yahoo snapshot · 20 sessions</span>
  <span style="display:inline-flex;align-items:center;font-size:11px;font-weight:500;color:#4F46E5;background:rgba(79,70,229,0.08);border:1px solid rgba(79,70,229,0.2);border-radius:999px;padding:4px 10px">flash</span>
  <span style="display:inline-flex;align-items:center;font-size:11px;font-weight:500;color:#2E7D32;background:#F0FBF0;border:1px solid #C8E6C9;border-radius:999px;padding:4px 10px">10,240 rows</span>
</div>
</body></html>
